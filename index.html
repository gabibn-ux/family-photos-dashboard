<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>תמונות משפחה 📸</title>
  <script>
    // Force reload with version param if not already versioned
    if (!location.search.includes('v=6')) location.replace('?v=6');
  </script>
  <link rel="stylesheet" href="gallery.css?v=6">
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────────────── -->
  <div id="header">
    <span id="logo-title">📸 תמונות משפחה</span>
    <button class="btn btn-secondary" id="btn-home">🏠 ראשי</button>
  </div>

  <!-- ── Search ──────────────────────────────────────────────────────────── -->
  <div id="search-wrap">
    <input id="search" type="search"
           placeholder="🔍 חיפוש תיקייה — שם אירוע, שנה או מקום..."
           autocomplete="off">
  </div>

  <!-- ── Category nav ────────────────────────────────────────────────────── -->
  <div id="cat-nav"></div>
  <hr class="divider">

  <!-- ── Sub-navigation (periods / events / folders) ─────────────────────── -->
  <div id="sub-nav"></div>

  <!-- ── Breadcrumb ──────────────────────────────────────────────────────── -->
  <div id="breadcrumb"></div>

  <!-- ── Toolbar (count + filter) ────────────────────────────────────────── -->
  <div id="toolbar">
    <span id="photo-count"></span>
  </div>

  <!-- ── Image grid ──────────────────────────────────────────────────────── -->
  <div id="grid-wrap">
    <div id="grid"></div>
  </div>

  <!-- ── Pagination ──────────────────────────────────────────────────────── -->
  <div id="pagination"></div>

  <!-- ── Loading overlay ─────────────────────────────────────────────────── -->
  <div id="loading">
    <div class="spinner"></div>
    <span>טוען…</span>
  </div>

  <!-- ── Modal ───────────────────────────────────────────────────────────── -->
  <div id="modal" hidden>
    <div id="modal-bg"></div>
    <div id="modal-box">
      <div id="modal-img-wrap">
        <img id="modal-img" alt="">
        <div class="modal-spinner" id="modal-spinner"></div>
      </div>
      <div id="modal-footer">
        <p id="modal-name"></p>
        <div id="modal-actions">
          <button id="modal-prev">‹</button>
          <button id="modal-next">›</button>
          <a id="modal-drive-link" target="_blank" rel="noopener">🔗 Drive</a>
          <button id="modal-close">✕</button>
        </div>
      </div>
    </div>
  </div>

  <script src="gallery.js?v=6"></script>
</body>
</html>
